<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="900" viewBox="0 0 1320 900" font-family="Helvetica,Arial,sans-serif">
<defs><marker id="arr" markerWidth="11" markerHeight="11" refX="8.5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 z" fill="#555"/></marker></defs>
<rect x="0" y="0" width="1320" height="900" fill="#ffffff"/>
<text x="660.0" y="38" text-anchor="middle" font-size="21" font-weight="700" fill="#111">Neural residual-compression pipeline</text>
<rect x="24" y="56" width="1272" height="610" rx="14" fill="#fafbff" stroke="#d9def0" stroke-width="1.5"/>
<text x="40" y="80" font-size="13" font-weight="700" fill="#7a8bbf">ENCODE  (offline: compress + train residual model)</text>
<rect x="24" y="686" width="1272" height="186" rx="14" fill="#f7fbf8" stroke="#cfe6d6" stroke-width="1.5"/>
<text x="40" y="710" font-size="13" font-weight="700" fill="#5a9a72">DECODE  (user side)</text>
<rect x="60" y="96" width="190" height="64" rx="10" ry="10" fill="#DCE9F7" stroke="#2c6fbf" stroke-width="2"/><text x="155.0" y="120" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#1a1a1a">Original data  X</text><text x="155.0" y="140" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#444">e.g. 512³ float32</text>
<rect x="330" y="96" width="210" height="64" rx="10" ry="10" fill="#E6E6E6" stroke="#666" stroke-width="2"/><text x="435.0" y="120" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#1a1a1a">Lossy compressor</text><text x="435.0" y="140" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#444">SZ3 / SPERR (error-bounded)</text>
<rect x="620" y="96" width="190" height="64" rx="10" ry="10" fill="#DCE9F7" stroke="#2c6fbf" stroke-width="2"/><text x="715.0" y="120" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#1a1a1a">Decompressed  X′</text><text x="715.0" y="140" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#444">lossy base reconstruction</text>
<rect x="355" y="182" width="150" height="40" rx="10" ry="10" fill="#E6E6E6" stroke="#666" stroke-width="2"/><text x="430.0" y="207.0" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#1a1a1a">SZ3 bitstream  .sz</text>
<path d="M 250,128 L 330,128" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arr)"/><rect x="260.8" y="117.0" width="58.4" height="16" rx="3" fill="#ffffff" opacity="0.92"/><text x="290.0" y="129.0" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#333">compress</text>
<path d="M 540,128 L 620,128" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arr)"/><rect x="544.5" y="117.0" width="71.0" height="16" rx="3" fill="#ffffff" opacity="0.92"/><text x="580.0" y="129.0" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#333">decompress</text>
<path d="M 430,160 L 430,182" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
<rect x="330" y="250" width="235" height="86" rx="10" ry="10" fill="#FCE3C8" stroke="#d98a3a" stroke-width="2"/><text x="447.5" y="274" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#1a1a1a">Phase 1 — Bayesian opt.</text><text x="447.5" y="294" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#444">search LR + slice axis</text><text x="447.5" y="310" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#444">(proxy PSNR, strided slices)</text>
<rect x="635" y="250" width="245" height="86" rx="10" ry="10" fill="#FCE3C8" stroke="#d98a3a" stroke-width="2"/><text x="757.5" y="274" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#1a1a1a">Phase 2 — train residual model</text><text x="757.5" y="294" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#444">Micro-UNet  (2D / 2.5D slab)</text><text x="757.5" y="310" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#444">band-split + frequency loss</text>
<path d="M 715,160 L 715,236 L 447,236 L 447,250" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arr)"/><rect x="561.7" y="219" width="146.6" height="16" rx="3" fill="#ffffff" opacity="0.92"/><text x="635" y="231" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#333">model input X′ (+ aux)</text>
<path d="M 565,293 L 635,293" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arr)"/><rect x="551.9" y="282" width="96.2" height="16" rx="3" fill="#ffffff" opacity="0.92"/><text x="600.0" y="294" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#333">best LR + axis</text>
<rect x="635" y="372" width="245" height="58" rx="10" ry="10" fill="#EAD9F5" stroke="#8e5bb5" stroke-width="2"/><text x="757.5" y="396" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#1a1a1a">Three frequency heads</text><text x="757.5" y="416" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#444">split prediction into Gaussian bands</text>
<path d="M 757,336 L 757,372" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
<rect x="445" y="470" width="180" height="58" rx="10" ry="10" fill="#D7F0DA" stroke="#3a9d4f" stroke-width="2"/><text x="535.0" y="494" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#1a1a1a">Low-freq residual</text><text x="535.0" y="514" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#444">R_low  (large scale)</text>
<rect x="665" y="470" width="180" height="58" rx="10" ry="10" fill="#D6E6FA" stroke="#3a73c2" stroke-width="2"/><text x="755.0" y="494" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#1a1a1a">Mid-freq residual</text><text x="755.0" y="514" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#444">R_mid</text>
<rect x="885" y="470" width="180" height="58" rx="10" ry="10" fill="#F8DAD9" stroke="#c0463f" stroke-width="2"/><text x="975.0" y="494" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#1a1a1a">High-freq residual</text><text x="975.0" y="514" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#444">R_high  (fine detail)</text>
<path d="M 700,430 L 535,470" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
<path d="M 757,430 L 757,470" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
<path d="M 815,430 L 975,470" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
<rect x="635" y="576" width="245" height="64" rx="10" ry="10" fill="#F6E7C2" stroke="#c79a3e" stroke-width="2"/><text x="757.5" y="600" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#1a1a1a">Predicted residual  R̂</text><text x="757.5" y="620" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#444">R̂ = R_low + R_mid + R_high</text>
<path d="M 535,528 L 700,576" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
<path d="M 757,528 L 757,576" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
<path d="M 975,528 L 815,576" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
<rect x="975" y="576" width="205" height="64" rx="10" ry="10" fill="#E2DCF6" stroke="#6a5acd" stroke-width="2"/><text x="1077.5" y="600" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#1a1a1a">Save as  model.pt</text><text x="1077.5" y="620" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#444">bf16 weights — counted in CR</text>
<path d="M 880,608 L 975,608" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arr)"/><rect x="904.6" y="597.0" width="45.8" height="16" rx="3" fill="#ffffff" opacity="0.92"/><text x="927.5" y="609.0" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#333">export</text>
<rect x="330" y="724" width="215" height="58" rx="10" ry="10" fill="#DCE9F7" stroke="#2c6fbf" stroke-width="2"/><text x="437.5" y="748" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#1a1a1a">Decompress  →  X′</text><text x="437.5" y="768" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#444">from  .sz</text>
<rect x="330" y="796" width="215" height="58" rx="10" ry="10" fill="#E2DCF6" stroke="#6a5acd" stroke-width="2"/><text x="437.5" y="820" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#1a1a1a">Load residual  →  R̂</text><text x="437.5" y="840" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#444">from  model.pt</text>
<rect x="650" y="760" width="290" height="66" rx="10" ry="10" fill="#CFEAD6" stroke="#2e8b57" stroke-width="2"/><text x="795.0" y="784" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#1a1a1a">Reconstruction  X̂</text><text x="795.0" y="804" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#444">X̂ = X′ + R̂   (error-bounded)</text>
